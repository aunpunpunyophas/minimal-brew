<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Login</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body class="auth-page">
  <main class="auth-wrap">
    <section class="auth-card">
      <div class="auth-head">
        <p class="auth-kicker">Minimal Brew</p>
        <h1 id="login-title">เข้าสู่ระบบ</h1>
        <p id="login-subtitle" class="page-subtitle">สำหรับหน้าแอดมินและหน้าบาริสต้า</p>
      </div>

      <p id="role-hint" class="panel-hint"></p>

      <form id="login-form" class="auth-form">
        <label for="username" id="username-label">ชื่อผู้ใช้</label>
        <input id="username" class="panel-input" type="text" autocomplete="username">

        <label for="password" id="password-label">รหัสผ่าน</label>
        <input id="password" class="panel-input" type="password" autocomplete="current-password">

        <button id="login-button" class="auth-submit" type="submit">เข้าสู่ระบบ</button>
      </form>

      <p id="login-message" class="auth-message" hidden></p>

      <div id="session-box" class="auth-session" hidden>
        <p id="session-text" class="panel-hint"></p>
        <button id="logout-button" type="button">ออกจากระบบ</button>
      </div>
    </section>
  </main>

  <script src="auth.js"></script>
  <script src="login.js"></script>
</body>
</html>
