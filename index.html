<!doctype html>
<html lang="th">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width,initial-scale=1">
	<title>ร้านกาแฟ - เมนู</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700&family=Prompt:wght@400;500;600;700&family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<header class="site-header">
		<div class="site-top">
			<div class="logo" aria-hidden="true">
				<svg viewBox="0 0 100 100" class="logo-svg" role="img" aria-label="Coffee logo">
					<circle cx="50" cy="50" r="48" fill="#6b4f3b" />
					<path d="M30 55c0 12 40 12 40 0" stroke="#fff" stroke-width="4" stroke-linecap="round" fill="none" />
					<path d="M60 30c6 0 6 8 0 8" stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none" />
				</svg>
			</div>
			<div class="shop-info">
				<h1 class="shop-name" id="shop-name">ร้านกาแฟ Minimal </h1>
				<p class="shop-address" id="shop-address">123 ถนนสุขสันต์, เมืองตัวอย่าง</p>
			</div>
		</div>
		<div class="header-actions">
			<div class="lang-switch">
				<button id="lang-th" class="lang-btn active" type="button">TH</button>
				<button id="lang-en" class="lang-btn" type="button">EN</button>
			</div>
		</div>
		<div id="table-info" class="table-info">ไม่พบหมายเลขโต๊ะ</div>
		<div class="announcement" id="announcement">วันนี้ไม่มีค่าจัดส่งเมื่อซื้อครบ 150 บาท</div>
		<button id="call-staff" class="call-staff" type="button" aria-label="เรียกพนักงาน">เรียกพนักงาน</button>
		<button id="order-history-btn" class="history-btn" type="button">ดูรายการสั่ง</button>
	</header>

	<div class="controls">
		<div class="search-wrap">
			<input id="search" type="search" placeholder="ค้นหาเมนู เช่น กาแฟลาเต้" aria-label="ค้นหาเมนู">
		</div>
		<nav class="categories" id="categories" aria-label="แถบหมวดหมู่"></nav>
	</div>

	<main id="menu-list" class="menu-list" aria-live="polite"></main>

	<div id="cart" class="cart" aria-hidden="true">
		<button id="cart-btn" class="cart-btn"><span id="cart-label">ตะกร้า</span> <span id="cart-count">0</span></button>
	</div>

	<div id="cart-overlay" class="cart-overlay" hidden></div>
	<div id="cart-sheet" class="cart-sheet" aria-hidden="true">
		<div class="sheet-handle" aria-hidden="true"></div>
		<div class="sheet-content">
			<header class="sheet-header">
				<h2 id="cart-title">ตะกร้าสินค้า</h2>
				<button id="close-sheet" class="close-btn" aria-label="ปิดตะกร้า">✕</button>
			</header>
			<div id="cart-items" class="cart-items"></div>
			<div class="note-area">
				<label for="cart-note" id="cart-note-label">หมายเหตุ</label>
				<textarea id="cart-note" placeholder="เช่น ไม่ใส่น้ำตาล หรือ ขอร้อน"></textarea>
			</div>
			<div class="sheet-footer">
				<div class="total">รวมทั้งหมด: <strong id="cart-total">฿0</strong></div>
				<div class="sheet-actions">
					<button id="clear-cart" class="clear-btn">ล้างตะกร้า</button>
					<button id="place-order" class="order-btn">สั่งซื้อ</button>
				</div>
			</div>
		</div>
	</div>

	<div id="order-history-overlay" class="cart-overlay order-history-overlay" hidden></div>
	<div id="order-history-sheet" class="cart-sheet order-history-sheet" aria-hidden="true">
		<div class="sheet-handle" aria-hidden="true"></div>
		<div class="sheet-content">
			<header class="sheet-header">
				<h2 id="order-history-title">ดูรายการสั่ง</h2>
				<button id="close-order-history" class="close-btn" aria-label="ปิดรายการสั่ง">✕</button>
			</header>
			<div id="order-history-session" class="history-session"></div>
			<div id="order-history-list" class="history-list"></div>
		</div>
	</div>

	<div id="call-modal-overlay" class="cart-overlay call-modal-overlay" hidden></div>
	<div id="call-modal" class="call-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="call-modal-title" aria-describedby="call-modal-hint" hidden>
		<div class="call-modal-panel">
			<header class="call-modal-head">
				<div>
					<h2 id="call-modal-title">เรียกพนักงาน</h2>
					<p id="call-modal-subtitle" class="call-modal-subtitle">เลือกประเภทคำขอที่ต้องการ</p>
				</div>
				<button id="close-call-modal" class="close-btn" type="button" aria-label="ปิด">✕</button>
			</header>
			<p id="call-modal-hint" class="call-modal-hint">แตะหนึ่งตัวเลือกเพื่อส่งคำขอ</p>
			<div id="call-request-list" class="call-request-list"></div>
		</div>
	</div>

	<div id="bill-preview-overlay" class="cart-overlay bill-preview-overlay" hidden></div>
	<div id="bill-preview-modal" class="bill-preview-modal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="bill-preview-title" hidden>
		<div class="bill-preview-panel">
			<header class="bill-preview-head">
				<div>
					<h2 id="bill-preview-title">ยืนยันการเช็กบิล</h2>
					<p id="bill-preview-subtitle" class="bill-preview-subtitle">ตรวจสอบรายการและยอดรวมก่อนส่งคำขอ</p>
				</div>
				<button id="close-bill-preview" class="close-btn" type="button" aria-label="ปิด">ปิด</button>
			</header>
			<div id="bill-preview-meta" class="bill-preview-meta"></div>
			<div id="bill-preview-list" class="bill-preview-list"></div>
			<div class="bill-preview-footer">
				<div class="bill-preview-total">
					<span>ยอดรวม</span>
					<strong id="bill-preview-total">฿0</strong>
				</div>
				<div class="bill-preview-actions">
					<button id="cancel-bill-preview" class="bill-preview-cancel" type="button">ยกเลิก</button>
					<button id="confirm-bill-preview" class="bill-preview-confirm" type="button">ยืนยันการเช็กบิล</button>
				</div>
			</div>
		</div>
	</div>

	<script src="menu-data.js"></script>
	<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
	<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
	<script src="firebase-config.js"></script>
	<script src="script.js"></script>
</body>
</html>
